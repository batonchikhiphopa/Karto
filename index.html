<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="meta.title">Karto</title>
  <meta name="theme-color" content="#0d1014">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      let theme = "system";
      let language = document.documentElement.lang || "en";

      try {
        if (window.api && typeof window.api.getBootstrapSettingsSync === "function") {
          const bootstrapSettings = window.api.getBootstrapSettingsSync() || {};
          if (bootstrapSettings.themePreference) {
            theme = bootstrapSettings.themePreference;
          }
          if (bootstrapSettings.languagePreference) {
            language = bootstrapSettings.languagePreference;
          }
        } else {
          theme = localStorage.getItem("karto.theme") || theme;
          language = localStorage.getItem("language") || language;
        }
      } catch {
        try {
          theme = localStorage.getItem("karto.theme") || theme;
          language = localStorage.getItem("language") || language;
        } catch {
          theme = "system";
        }
      }

      document.documentElement.dataset.theme = theme || "system";
      document.documentElement.lang = language || "en";
    })();
  </script>
</head>
<body>
  <div class="mobile-topbar">
    <button
      id="sidebarToggleBtn"
      class="mobile-topbar-btn"
      type="button"
      aria-label="Open navigation"
      data-i18n-aria-label="sidebar.open"
      data-i18n-title="sidebar.open"
    >
      <span aria-hidden="true">☰</span>
    </button>
  </div>

  <div id="sidebarOverlay" class="sidebar-overlay" hidden></div>

  <div class="app-shell">
    <div id="sidebarMount"></div>

    <main class="main" id="appMain">
      <section id="homeScreen" class="screen is-active" aria-labelledby="homeTitle">
        <h1 id="homeTitle" class="visually-hidden" data-i18n="nav.home">Home</h1>
        <div class="deck-grid" id="deckGrid"></div>
      </section>

      <section id="libraryScreen" class="screen" aria-labelledby="libraryTitle">
        <div class="screen-header">
          <div class="screen-heading">
            <div class="screen-title-row">
              <h2 id="libraryTitle" class="screen-title" data-i18n="library.title">Library</h2>
              <button
                class="icon-btn icon-btn-accent library-import-btn"
                id="libraryImportBtn"
                type="button"
                aria-label="Import decks"
                data-i18n-aria-label="actions.importDecks"
                data-i18n-title="actions.importDecks"
              >
                <span aria-hidden="true">⤓</span>
              </button>
            </div>
            <p class="screen-subtitle" data-i18n="library.subtitle">Decks, import, and sharing.</p>
          </div>
        </div>

        <div class="lib-deck-list" id="libraryDeckList"></div>
      </section>

      <section id="editDeckScreen" class="screen" aria-labelledby="editDeckTitle">
        <div class="screen-header editdeck-header">
          <div class="screen-header-top editdeck-header-top">
            <div class="screen-heading editdeck-heading">
              <h2 id="editDeckTitle" class="screen-title"></h2>
            </div>
            <div class="editdeck-header-actions">
              <button
                class="icon-btn icon-btn-accent"
                id="editDeckCreateCardBtn"
                type="button"
                aria-label="Create card"
                data-i18n-aria-label="editDeck.createCard"
                data-i18n-title="editDeck.createCard"
              >
                <span aria-hidden="true">+</span>
              </button>
              <button
                class="icon-btn"
                id="editDeckAddFromOtherBtn"
                type="button"
                aria-label="Add from another deck"
                data-i18n-aria-label="editDeck.addFromOther"
                data-i18n-title="editDeck.addFromOther"
              >
                <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="5" y="7" width="10" height="10" rx="1.8"></rect>
                  <path d="M9 4h8a2 2 0 0 1 2 2v8"></path>
                  <path d="M19 13v6"></path>
                  <path d="M16 16h6"></path>
                </svg>
              </button>
              <button
                class="icon-btn icon-btn-accent"
                id="startDeckStudyBtn"
                type="button"
                aria-label="Start study"
                data-i18n-aria-label="study.startStudy"
                data-i18n-title="study.startStudy"
              >
                <span aria-hidden="true">▶</span>
              </button>
              <button
                class="panel-close-btn"
                id="closeEditDeckBtn"
                type="button"
                aria-label="Close"
                data-i18n-aria-label="common.close"
                data-i18n-title="common.close"
              >
                <span aria-hidden="true">✕</span>
              </button>
            </div>
          </div>
        </div>

        <div class="card-list" id="editDeckCardList"></div>
      </section>

      <section id="settingsScreen" class="screen" aria-labelledby="settingsTitle">
        <div class="screen-header">
          <div class="screen-heading">
            <h2 id="settingsTitle" class="screen-title" data-i18n="settings.title">Settings</h2>
            <p class="screen-subtitle" data-i18n="settings.subtitle">Language, desktop, layout, and theme.</p>
          </div>
        </div>

        <div class="settings-grid">
          <div class="settings-panel">
            <div class="settings-row">
              <label for="languageSelect" data-i18n="settings.language">Interface language</label>
              <select id="languageSelect">
                <option value="en" data-i18n="settings.languageOptionEn">English</option>
                <option value="de" data-i18n="settings.languageOptionDe">Deutsch</option>
                <option value="ru" data-i18n="settings.languageOptionRu">Русский</option>
              </select>
            </div>

            <div class="settings-row">
              <label for="themeSelect" data-i18n="settings.theme">Theme</label>
              <select id="themeSelect">
                <option value="system" data-i18n="settings.themeSystem">System</option>
                <option value="dark" data-i18n="settings.themeDark">Dark</option>
                <option value="light" data-i18n="settings.themeLight">Light</option>
              </select>
            </div>

            <div class="settings-row" id="windowModeRow" hidden>
              <label for="windowModeSelect" data-i18n="settings.windowMode">Window mode</label>
              <select id="windowModeSelect">
                <option value="fullscreen" data-i18n="settings.windowModeFullscreen">Fullscreen</option>
                <option value="windowed" data-i18n="settings.windowModeWindowed">Windowed</option>
              </select>
            </div>

            <div class="settings-row">
              <label for="homeGridColumnsSelect" data-i18n="settings.homeTilesPerRow">Home tiles per row</label>
              <select id="homeGridColumnsSelect">
                <option value="auto" data-i18n="settings.homeTilesAuto">Auto</option>
                <option value="2" data-i18n="settings.homeTiles2">2</option>
                <option value="3" data-i18n="settings.homeTiles3">3</option>
                <option value="4" data-i18n="settings.homeTiles4">4</option>
              </select>
            </div>

            <div class="settings-row settings-row-checkbox">
              <label for="autoGermanArticleCheckbox">
                <input id="autoGermanArticleCheckbox" type="checkbox">
                <span data-i18n="settings.autoGermanArticle">Auto-insert article for German nouns</span>
              </label>
            </div>

            <div class="settings-actions">
              <button class="lib-btn lib-btn-green" id="saveSettingsBtn" type="button" data-i18n="settings.saveChanges">Save changes</button>
            </div>
          </div>

        </div>
      </section>

      <section id="createCardScreen" class="screen" aria-labelledby="cardFormTitle">
        <div class="screen-header screen-header-closeable">
          <div class="screen-heading">
            <h2 id="cardFormTitle" class="screen-title" data-i18n="cardForm.titleCreate">Create card</h2>
            <p class="screen-subtitle" data-i18n="cardForm.subtitle">Front, answer, and image.</p>
          </div>
          <button
            class="panel-close-btn"
            id="closeCardFormBtn"
            type="button"
            aria-label="Close"
            data-i18n-aria-label="common.close"
            data-i18n-title="common.close"
          >
            <span aria-hidden="true">✕</span>
          </button>
        </div>

        <div class="form-layout">
          <div class="form-inner">
            <div class="form-body">
              <div class="form-label-row">
                <label class="form-label form-label-with-side" for="frontTextInput">
                  <span class="side-indicator side-indicator-front" aria-hidden="true"></span>
                  <span data-i18n="cardForm.frontLabel">Front side</span>
                </label>
                <div class="field-side-tools">
                  <button
                    class="icon-btn card-side-tool"
                    id="frontSearchImagesBtn"
                    type="button"
                    aria-label="Find images"
                    data-i18n-aria-label="cardForm.searchImages"
                    data-i18n-title="cardForm.searchImages"
                  >
                    <span aria-hidden="true">⌕</span>
                  </button>
                  <button
                    class="icon-btn card-side-tool"
                    id="frontUploadImageBtn"
                    type="button"
                    aria-label="Upload image"
                    data-i18n-aria-label="cardForm.uploadImage"
                    data-i18n-title="cardForm.uploadImage"
                  >
                    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="4" y="5" width="16" height="14" rx="2"></rect>
                      <path d="M8 16l3-3 2 2 2-3 3 4"></path>
                      <path d="M12 11V3"></path>
                      <path d="M9 6l3-3 3 3"></path>
                    </svg>
                  </button>
                </div>
              </div>
              <input class="form-input" id="frontTextInput" data-i18n-placeholder="cardForm.frontPlaceholder" placeholder="Word or question">

              <div class="lookup-toolbar">
                <div class="lookup-control">
                  <div class="lookup-split-button">
                    <button class="lib-btn lookup-split-main" id="getDefinitionBtn" type="button" data-i18n="cardForm.getDefinition">Get meaning</button>
                    <button
                      class="lookup-split-toggle"
                      id="definitionIndicatorBtn"
                      type="button"
                      aria-label="Choose dictionary source"
                      aria-haspopup="menu"
                      aria-expanded="false"
                      data-i18n-aria-label="cardForm.chooseDefinitionSource"
                      data-i18n-title="cardForm.chooseDefinitionSource"
                    >
                      <span class="lookup-code" id="definitionSelectionLabel"></span>
                      <span class="lookup-indicator-icon" aria-hidden="true">▼</span>
                    </button>
                  </div>
                  <div class="split-control-menu" id="getDefinitionMenu" hidden>
                    <button class="split-control-option" type="button" data-dict-lang="en" data-i18n="cardForm.definitionOptionEn">EN · dictionaryapi.dev</button>
                    <button class="split-control-option" type="button" data-dict-lang="de" data-i18n="cardForm.definitionOptionDe">DE · DWDS</button>
                    <button class="split-control-option" type="button" data-dict-lang="ru" data-i18n="cardForm.definitionOptionRu">RU · Wiktionary</button>
                  </div>
                </div>

                <div class="lookup-control">
                  <div class="lookup-split-button">
                    <button class="lib-btn lookup-split-main" id="translateBtn" type="button" data-i18n="cardForm.translate">Translate</button>
                    <button
                      class="lookup-split-toggle"
                      id="translationIndicatorBtn"
                      type="button"
                      aria-label="Choose translation language"
                      aria-haspopup="menu"
                      aria-expanded="false"
                      data-i18n-aria-label="cardForm.chooseTranslationTarget"
                      data-i18n-title="cardForm.chooseTranslationTarget"
                    >
                      <span class="lookup-code" id="translationSelectionLabel"></span>
                      <span class="lookup-indicator-icon" aria-hidden="true">▼</span>
                    </button>
                  </div>
                  <div class="split-control-menu" id="translateMenu" hidden>
                    <button class="split-control-option" type="button" data-target-lang="en" data-i18n="cardForm.translationOptionEn">EN</button>
                    <button class="split-control-option" type="button" data-target-lang="de" data-i18n="cardForm.translationOptionDe">DE</button>
                    <button class="split-control-option" type="button" data-target-lang="ru" data-i18n="cardForm.translationOptionRu">RU</button>
                  </div>
                </div>
              </div>

              <div class="form-label-row">
                <label class="form-label form-label-with-side" for="backTextInput">
                  <span class="side-indicator side-indicator-back" aria-hidden="true"></span>
                  <span data-i18n="cardForm.backLabel">Back side</span>
                </label>
              </div>
              <textarea class="form-input form-textarea" id="backTextInput" data-i18n-placeholder="cardForm.backPlaceholder" placeholder="Definition or answer"></textarea>

              <div class="form-label-row">
                <label class="form-label" for="imageInput" data-i18n="cardForm.imageLabel">Image</label>
                <div class="image-side-toggle" role="group" aria-label="Choose image side">
                  <button
                    class="icon-btn image-side-btn"
                    id="imageSideFrontBtn"
                    type="button"
                    aria-label="Use image on front side"
                    data-i18n-aria-label="cardForm.imageSideFront"
                    data-i18n-title="cardForm.imageSideFront"
                  >
                    <span class="side-indicator side-indicator-front" aria-hidden="true"></span>
                  </button>
                  <button
                    class="icon-btn image-side-btn"
                    id="imageSideBackBtn"
                    type="button"
                    aria-label="Use image on back side"
                    data-i18n-aria-label="cardForm.imageSideBack"
                    data-i18n-title="cardForm.imageSideBack"
                  >
                    <span class="side-indicator side-indicator-back" aria-hidden="true"></span>
                  </button>
                </div>
              </div>
              <input class="form-input" id="imageInput" data-i18n-placeholder="cardForm.imagePlaceholder" placeholder="Paste a link or choose below">
              <input class="form-input form-file-input" id="imageFileInput" type="file" accept="image/*" hidden>

              <div class="image-preview-wrap" id="imagePreviewWrap">
                <img class="image-preview-thumb" id="imagePreviewThumb" src="" alt="">
                <button
                  class="image-preview-clear"
                  id="imagePreviewClearBtn"
                  type="button"
                  aria-label="Clear image"
                  data-i18n-aria-label="cardForm.clearImage"
                  data-i18n-title="cardForm.clearImage"
                >
                  <span aria-hidden="true">✕</span>
                </button>
              </div>

              <div id="imageResults" class="image-results" aria-live="polite"></div>

              <label class="form-label" for="deckSelect" data-i18n="cardForm.deckLabel">Deck</label>
              <select class="form-input" id="deckSelect"></select>

              <button class="lib-btn lib-btn-green" id="saveCardBtn" type="button" data-i18n="cardForm.save">Save card</button>
            </div>
          </div>
        </div>
      </section>

      <section id="mergeDecksScreen" class="screen" aria-labelledby="mergeTitle">
        <div class="screen-header screen-header-closeable">
          <div class="screen-heading">
            <h2 id="mergeTitle" class="screen-title" data-i18n="merge.title">Merge decks</h2>
          </div>
          <button
            class="panel-close-btn"
            id="closeMergeBtn"
            type="button"
            aria-label="Close"
            data-i18n-aria-label="common.close"
            data-i18n-title="common.close"
          >
            <span aria-hidden="true">✕</span>
          </button>
        </div>

        <div class="form-inner form-inner-compact">
          <div class="form-body">
            <label class="form-label" data-i18n="merge.selectLabel">Choose decks to merge</label>
            <div id="mergeCheckboxList" class="merge-checkbox-list"></div>
            <label class="form-label" for="mergeNewNameInput" data-i18n="merge.newNameLabel">New deck name</label>
            <input class="form-input" id="mergeNewNameInput" data-i18n-placeholder="merge.namePlaceholder" placeholder="Name">
            <button class="lib-btn lib-btn-green" id="confirmMergeBtn" type="button" data-i18n="merge.confirm">Merge</button>
          </div>
        </div>
      </section>

      <section id="addFromOtherScreen" class="screen" aria-labelledby="addFromOtherTitle">
        <div class="screen-header screen-header-closeable">
          <div class="screen-heading">
            <h2 id="addFromOtherTitle" class="screen-title" data-i18n="addFromOther.title">Add from another deck</h2>
            <p class="screen-subtitle" data-i18n="addFromOther.subtitle">Copy cards from one deck into another.</p>
          </div>
          <button
            class="panel-close-btn"
            id="closeAddOtherBtn"
            type="button"
            aria-label="Close"
            data-i18n-aria-label="common.close"
            data-i18n-title="common.close"
          >
            <span aria-hidden="true">✕</span>
          </button>
        </div>

        <div class="form-inner">
          <div class="form-body">
            <label class="form-label" for="sourceOtherDeckSelect" data-i18n="addFromOther.sourceDeck">Source deck</label>
            <select class="form-input" id="sourceOtherDeckSelect"></select>
            <div id="sourceCardList" class="source-card-list"></div>
          </div>
        </div>
      </section>

      <section id="studyScreen" class="screen screen-study" aria-labelledby="studyTitle">
        <div class="study-wrap" id="studyWrap">
          <h2 id="studyTitle" class="visually-hidden" data-i18n="study.title">Study mode</h2>

          <button
            class="study-exit-btn"
            id="exitStudyBtn"
            type="button"
            aria-label="Close study mode"
            data-i18n-aria-label="study.close"
            data-i18n-title="study.close"
          >
            <span aria-hidden="true">✕</span>
          </button>

          <button class="study-edge study-edge-left" id="wrongZone" type="button" aria-label="Don't know">
            <span class="study-edge-label" id="wrongLabel" data-i18n="study.wrong">Don't know</span>
          </button>
          <button class="study-edge study-edge-right" id="correctZone" type="button" aria-label="Know it">
            <span class="study-edge-label" id="correctLabel" data-i18n="study.correct">Know it</span>
          </button>
          <button class="study-edge study-edge-bottom" id="unsureZone" type="button" aria-label="Not sure">
            <span class="study-edge-label" id="unsureLabel" data-i18n="study.unsure">Not sure</span>
          </button>
          <button class="study-edge study-edge-top" id="backZone" type="button" aria-label="Back">
            <span class="study-edge-label" id="backLabel" data-i18n="study.back">Back</span>
          </button>

          <div class="study-card-area">
            <div class="study-card" id="studyCard" tabindex="0" role="button" aria-live="polite"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>

  <template id="sidebarTemplate">
    <aside class="sidebar" id="appSidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <img src="logo.svg" data-i18n-alt="meta.logoAlt" alt="Karto logo">
        </div>
        <div class="sidebar-brand-text">
          <h1 class="sidebar-title">Karto</h1>
        </div>
        <button
          class="sidebar-close"
          id="sidebarCloseBtn"
          type="button"
          aria-label="Close navigation"
          data-i18n-aria-label="sidebar.close"
          data-i18n-title="sidebar.close"
        >
          <span aria-hidden="true">✕</span>
        </button>
      </div>

      <nav class="sidebar-panel" aria-label="Primary">
        <button class="sidebar-link active" type="button" data-nav="homeScreen" data-i18n="nav.home">Home</button>
        <button class="sidebar-link" type="button" data-nav="libraryScreen" data-i18n="nav.library">Library</button>
        <button class="sidebar-link" type="button" data-nav="settingsScreen" data-i18n="nav.settings">Settings</button>
      </nav>

      <div class="sidebar-actions">
        <button
          class="sidebar-action-btn sidebar-action-btn-danger"
          id="sidebarQuitBtn"
          type="button"
          data-sidebar-action="quit"
          data-i18n="sidebar.quitApp"
          data-i18n-aria-label="sidebar.quitApp"
          data-i18n-title="sidebar.quitApp"
          hidden
        >
          Exit app
        </button>
      </div>
    </aside>
  </template>

  <script src="i18n.js"></script>
  <script src="js/data-model.js"></script>
  <script src="js/dom-utils.js"></script>
  <script src="js/study-engine.js"></script>
  <script src="js/app-state.js"></script>
  <script src="js/global-shortcuts.js"></script>
  <script src="js/router.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui/sidebar.js"></script>
  <script src="js/ui/toast.js"></script>
  <script src="js/views/home-view.js"></script>
  <script src="js/views/library-view.js"></script>
  <script src="js/views/deck-editor-view.js"></script>
  <script src="js/views/card-form-view.js"></script>
  <script src="js/views/study-view.js"></script>
  <script src="js/views/settings-view.js"></script>
  <script src="js/pwa.js"></script>
  <script src="app.js"></script>
</body>
</html>
